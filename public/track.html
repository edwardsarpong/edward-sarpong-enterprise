<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Your Order | Edward Sarpong Enterprise</title>
  <link rel="stylesheet" href="shop.css">
  <style>
    .track-page { max-width: 680px; margin: 60px auto; padding: 0 5% 80px; }
    .track-page h1 { font-size: clamp(24px, 5vw, 36px); margin-bottom: 8px; }
    .track-card { background: #fff; border-radius: 20px; padding: 28px; box-shadow: var(--shadow); border: 1px solid var(--border); margin-top: 24px; }
    .track-input-row { display: flex; gap: 12px; margin-top: 20px; }
    .track-input-row input { flex: 1; padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border); font-size: 15px; }
    .status-timeline { display: flex; flex-direction: column; gap: 0; margin-top: 20px; }
    .timeline-step { display: flex; gap: 16px; align-items: flex-start; position: relative; }
    .timeline-step:not(:last-child)::before { content: ''; position: absolute; left: 15px; top: 32px; width: 2px; height: calc(100% + 12px); background: var(--border); z-index: 0; }
    .step-dot { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--border); background: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; z-index: 1; position: relative; }
    .step-dot.done { background: var(--ink); border-color: var(--ink); color: var(--cream); }
    .step-dot.active { background: var(--gold); border-color: var(--gold); color: #fff; }
    .step-body { padding: 4px 0 20px; }
    .step-body strong { display: block; font-size: 15px; }
    .step-body span { font-size: 13px; color: rgba(27,24,20,0.6); }
    .order-items-list { display: grid; gap: 10px; margin-top: 16px; }
    .order-item-row { display: flex; gap: 14px; align-items: center; padding: 12px; border: 1px solid var(--border); border-radius: 12px; }
    .order-item-row img { width: 56px; height: 56px; border-radius: 10px; object-fit: cover; }
    .order-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 20px; margin-top: 16px; font-size: 14px; }
    .order-detail-grid dt { color: rgba(27,24,20,0.5); font-weight: 600; }
    .order-detail-grid dd { margin: 0; font-weight: 600; }
    #trackMessage { margin-top: 16px; padding: 12px 16px; border-radius: 12px; font-size: 14px; display: none; }
    .err-msg { background: rgba(255,59,48,0.1); }
    .ok-msg { background: rgba(76,175,80,0.1); }
  </style>
</head>
<body>
  <header class="shop-header">
    <a class="logo" href="index.html" aria-label="Edward Sarpong Enterprise">
      <div class="name-container">
        <div class="first-name">EDWARD</div>
        <div class="last-name-container">
          <div class="last-name">SARPONG</div>
          <div class="tagline">MORE TO EXPLORE</div>
        </div>
      </div>
    </a>
    <nav class="shop-nav">
      <a href="index.html">Home</a>
      <a href="kitchen-cabinets.html">Services</a>
      <a href="shop.html">Shop</a>
      <a href="index.html#contact">Contact</a>
      <a href="track.html" class="active">Track Order</a>
    </nav>
  </header>

  <main class="track-page">
    <h1>Track Your Order</h1>
    <p class="muted">Enter your Order ID to see the latest status. You received your Order ID in the confirmation message.</p>

    <div class="track-card">
      <label for="orderIdInput"><strong>Order ID</strong></label>
      <div class="track-input-row">
        <input type="text" id="orderIdInput" placeholder="e.g. xK3qA7Bc9Ld2…" spellcheck="false" autocomplete="off">
        <button class="btn" type="button" id="trackBtn">Track</button>
      </div>
      <div id="trackMessage"></div>
    </div>

    <div id="orderResult" hidden>
      <!-- Injected by track.js -->
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="shop-config.js"></script>
  <script src="track.js"></script>
</body>
</html>
